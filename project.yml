name: Kindred
options:
  bundleIdPrefix: com.kindred
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.1.2"
    CURRENT_PROJECT_VERSION: "5"
packages:
  SwiftSoup:
    path: Vendor/SwiftSoup
targets:
  Kindred:
    type: application
    platform: iOS
    sources:
      - Kindred
    info:
      path: Kindred/Info.plist
      properties:
        CFBundleDisplayName: Kindred
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.kindred.file.azw3
            UTTypeDescription: Amazon Kindle AZW3 eBook
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - azw3
              public.mime-type:
                - application/vnd.amazon.mobi8-ebook
          - UTTypeIdentifier: com.kindred.file.azw
            UTTypeDescription: Amazon Kindle AZW eBook
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - azw
              public.mime-type:
                - application/vnd.amazon.ebook
          - UTTypeIdentifier: com.kindred.file.mobi
            UTTypeDescription: Mobipocket eBook
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - mobi
              public.mime-type:
                - application/x-mobipocket-ebook
        NSLocalNetworkUsageDescription: Kindred uses your local network to share books with your Kindle.
        NSBonjourServices:
          - _http._tcp
        NSAppTransportSecurity:
          NSExceptionDomains:
            z-lib.pub:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
              NSExceptionMinimumTLSVersion: TLSv1.0
              NSThirdPartyExceptionAllowsInsecureHTTPLoads: true
            z-library.im:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
              NSExceptionMinimumTLSVersion: TLSv1.0
              NSThirdPartyExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kev1nweng.kindred
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: Kindred/Kindred.entitlements
      properties:
        com.apple.security.application-groups:
          - group.space.kev1nweng.kindred
    dependencies:
      - target: KindredShare
        embed: true
      - package: SwiftSoup
    scheme:
      testTargets:
        - KindredTests
  KindredShare:
    type: app-extension
    platform: iOS
    sources:
      - KindredShare
    info:
      path: KindredShare/Info.plist
      properties:
        CFBundleDisplayName: Kindred
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsFileWithMaxCount: 20
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kev1nweng.kindred.share
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: KindredShare/KindredShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.space.kev1nweng.kindred
  KindredTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - KindredTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kev1nweng.kindred.tests
    dependencies:
      - target: Kindred
